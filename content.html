<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANNORR — Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0a0a0a;--fg:#e8e4df;--accent:#c8ff00;--muted:#5a5651;--card:#111;--border:rgba(255,255,255,0.07);--display:'Syne',sans-serif;--mono:'DM Mono',monospace;--serif:'Instrument Serif',serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-weight:300;min-height:100vh;overflow-x:hidden}
#lockScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem}
.lock-logo{font-family:var(--display);font-size:2.5rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.lock-logo span{display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:50%;margin-left:4px;vertical-align:middle}
.lock-sub{font-size:.65rem;text-transform:uppercase;letter-spacing:.3em;color:var(--muted)}
.lock-form{display:flex;flex-direction:column;gap:.75rem;width:280px}
.lock-input{background:var(--card);border:1px solid var(--border);color:var(--fg);font-family:var(--mono);font-size:.85rem;padding:.9rem 1.2rem;outline:none;transition:border-color .3s;letter-spacing:.1em}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{background:var(--accent);color:#0a0a0a;border:none;font-family:var(--mono);font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.2em;padding:.9rem;cursor:pointer;transition:opacity .2s}
.lock-btn:hover{opacity:.85}
.lock-err{font-size:.65rem;color:#ff4444;text-align:center;letter-spacing:.1em;display:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:8000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.03}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:1rem 3vw;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--display);font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase}
.nav-logo span{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin-left:3px;vertical-align:middle}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-tag{font-size:.58rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent);border:1px solid rgba(200,255,0,.3);padding:.25rem .7rem}
.nav-count{font-size:.6rem;color:var(--muted)}
.controls{padding:1.5rem 3vw;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:1rem;align-items:center}
.ctrl-group{display:flex;flex-direction:column;gap:.4rem}
.ctrl-label{font-size:.5rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent)}
.ctrl-pills{display:flex;gap:.35rem;flex-wrap:wrap}
.pill{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;padding:.3rem .85rem;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;background:none}
.pill:hover{border-color:var(--fg);color:var(--fg)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.06)}
.search-wrap{margin-left:auto}
.search-input{background:var(--card);border:1px solid var(--border);color:var(--fg);font-family:var(--mono);font-size:.72rem;padding:.5rem 1rem;outline:none;width:200px;transition:border-color .3s}
.search-input:focus{border-color:var(--accent)}
.grid-wrap{padding:2rem 3vw}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.post-card{background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border-color .25s,transform .25s;position:relative;overflow:hidden}
.post-card:hover{border-color:rgba(200,255,0,.4);transform:translateY(-2px)}
.post-thumb{width:100%;overflow:hidden;display:flex;align-items:flex-start}
.post-card-info{padding:.75rem 1rem;border-top:1px solid var(--border)}
.post-card-date{font-size:.55rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:.2rem}
.post-card-topic{font-size:.7rem;color:var(--fg);line-height:1.4;margin-bottom:.4rem}
.post-card-meta{display:flex;gap:.35rem;flex-wrap:wrap}
.pct{font-size:.5rem;text-transform:uppercase;letter-spacing:.12em;padding:.2rem .5rem;border:1px solid var(--border);color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:5000;display:none;align-items:center;justify-content:center;padding:2rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-inner{display:flex;gap:2rem;align-items:flex-start;max-width:1000px;width:100%}
.modal-preview-wrap{flex-shrink:0;position:relative}
.modal-canvas-container{width:360px;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8)}
.modal-close{position:absolute;top:-2.5rem;right:0;background:none;border:1px solid var(--border);color:var(--fg);font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;padding:.4rem .9rem;cursor:pointer;transition:border-color .2s}
.modal-close:hover{border-color:var(--accent)}
.modal-side{flex:1;display:flex;flex-direction:column;gap:1rem;min-width:0}
.modal-date{font-size:.55rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent)}
.modal-topic{font-family:var(--display);font-size:1.1rem;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.modal-pillar{font-size:.62rem;text-transform:uppercase;letter-spacing:.2em;color:var(--muted)}
.modal-caption-label,.modal-theme-label{font-size:.52rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent)}
.modal-caption{background:#0a0a0a;border:1px solid var(--border);padding:.9rem 1rem;font-size:.7rem;line-height:1.8;color:var(--fg);max-height:130px;overflow-y:auto}
.theme-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.4rem}
.theme-btn{aspect-ratio:1;border:2px solid transparent;cursor:pointer;border-radius:6px;transition:border-color .2s;overflow:hidden;display:flex;align-items:center;justify-content:center}
.theme-btn.active{border-color:var(--accent)}
.theme-btn span{font-size:.4rem;text-transform:uppercase;letter-spacing:.06em;font-weight:500;font-family:'DM Mono',monospace}
.modal-dl-btn{background:var(--accent);color:#0a0a0a;border:none;font-family:var(--mono);font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.18em;padding:1rem;cursor:pointer;transition:opacity .2s;width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem}
.modal-dl-btn:hover{opacity:.88}
.modal-dl-btn:disabled{opacity:.4;cursor:not-allowed}
.modal-nav{display:flex;gap:.5rem}
.modal-nav-btn{flex:1;background:none;border:1px solid var(--border);color:var(--fg);font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;padding:.6rem;cursor:pointer;transition:border-color .2s}
.modal-nav-btn:hover{border-color:var(--accent)}
@media(max-width:768px){.modal-inner{flex-direction:column;align-items:center}.modal-canvas-container{width:100%;max-width:320px}.modal-side{width:100%}.theme-grid{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>

  <div class="lock-logo">MANNORR<span></span></div>
  <div class="lock-sub">Content Studio — Private Access</div>

<div id="studio" style="display:none">
<nav>
  <div class="nav-logo">MANNORR<span></span></div>

    <div class="nav-tag">Content Studio</div>

  </div>
</nav>
<div class="controls">
  <div class="ctrl-group">
    <div class="ctrl-label">Pillar</div>
    <div class="ctrl-pills" id="pillarFilters">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="Design Tip">Design Tip</button>

      <button class="pill" data-filter="Portfolio Spotlight">Portfolio</button>
      <button class="pill" data-filter="Behind the Work">Process</button>
      <button class="pill" data-filter="Quote">Quote</button>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Month</div>
    <div class="ctrl-pills" id="monthFilters">
      <button class="pill active" data-month="all">All</button>
      <button class="pill" data-month="Apr">April</button>
      <button class="pill" data-month="May">May</button>
    </div>
  </div>
  <div class="ctrl-group search-wrap">
    <div class="ctrl-label">Search</div>
    <input class="search-input" type="text" id="searchInput" placeholder="Search topics...">
  </div>
</div>
<div class="grid-wrap"><div class="grid" id="postGrid"></div></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-inner">
    <div class="modal-preview-wrap">
      <button class="modal-close" onclick="closeModal()">✕ Close</button>
      <div class="modal-canvas-container" id="previewContainer"></div>
    </div>
    <div class="modal-side">
      <div>
        <div class="modal-date" id="mDate"></div>
        <div class="modal-topic" id="mTopic"></div>
        <div class="modal-pillar" id="mPillar"></div>
      </div>
      <div>
        <div class="modal-caption-label" style="margin-bottom:.4rem">Caption</div>
        <div class="modal-caption" id="mCaption"></div>
      </div>
      <div>
        <div class="modal-theme-label" style="margin-bottom:.5rem">Theme — click to switch</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>
      <button class="modal-dl-btn" id="dlBtn" onclick="downloadPost()">↓ Download 1080 × 1350 JPEG</button>
      <div class="modal-nav">
        <button class="modal-nav-btn" onclick="navPost(-1)">← Prev</button>
        <button class="modal-nav-btn" onclick="navPost(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASS='mannorr2026';
function unlock(){
  if(document.getElementById('pwInput').value===PASS){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('studio').style.display='block';
    renderGrid();
  } else {
    document.getElementById('lockErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

["Apr 05","Sun","Design Tip","Rule of thirds in layout design","Carousel","In design, the rule of thirds creates natural visual flow. Divide your canvas into a 3x3 grid. Place key elements at intersections. #DesignTips #MANNORR #VisualDesign #Layout #GraphicDesign"],

const THEMES=[
  {id:'dark',label:'Dark',bg:'#0a0a0a',fg:'#e8e4df',accent:'#c8ff00'},
  {id:'light',label:'Light',bg:'#f5f2ed',fg:'#1a1a1a',accent:'#5a00e6'},

const PILLAR_ACCENT={
  'Design Tip':'inherit',
  'Brand Advice':'inherit',
  'Portfolio Spotlight':'inherit',
  'Behind the Work':'inherit',
  'Quote':'inherit'
};

let currentPost=0,currentTheme=THEMES[0],filteredPosts=[...POSTS];
let activeFilter='all',activeMonth='all',searchTerm='';

function applyFilters(){
  filteredPosts=POSTS.filter(p=>{
    const mp=activeFilter==='all'||p[2]===activeFilter;
    const mm=activeMonth==='all'||p[0].startsWith(activeMonth);
    const ms=!searchTerm||p[3].toLowerCase().includes(searchTerm.toLowerCase());
    return mp&&mm&&ms;
  });
  document.getElementById('navCount').textContent=filteredPosts.length+' posts';
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('postGrid');
  grid.innerHTML='';
  filteredPosts.forEach((post,i)=>{
    const card=document.createElement('div');
    card.className='post-card';
    card.onclick=()=>openModal(POSTS.indexOf(post));
    const thumbWrap=document.createElement('div');
    thumbWrap.className='post-thumb';
    const scale=220/1080;
    const ih=Math.round(1350*scale);

function getTips(topic){
  const t=topic.toLowerCase();
  if(t.includes('rule of thirds'))return['Divide canvas into a 3x3 grid','Place key elements at intersections','Let the eye follow natural paths'];
  if(t.includes('typography'))return['Display: 1 weight, oversized','Body: comfortable reading size','Caption: small, muted, supporting'];
  if(t.includes('white space'))return['Space creates visual priority','Crowding confuses the reader','Negative space is positive design'];
  if(t.includes('grid'))return['12 columns for maximum flexibility','Gutters define breathing room','Break the grid once, deliberately'];
  if(t.includes('contrast'))return['Size contrast creates hierarchy','Color contrast draws the eye','Weight contrast defines reading order'];
  if(t.includes('dark mode'))return['Near-black over pure black','Warm off-whites over pure white','One accent, used with restraint'];
  if(t.includes('gestalt'))return['Proximity groups related elements','Similarity creates visual rhythm','Continuity guides the eye forward'];
  if(t.includes('editorial'))return['One strong entry point per spread','Column logic before any asset','Break the grid only with intention'];
  if(t.includes('visual rhythm'))return['Repeat elements with variation','Consistent spacing builds trust','One accent break per composition'];
  if(t.includes('typeface'))return['Serif communicates trust and heritage','Sans-serif signals clarity and modernity','Display expresses personality'];
  if(t.includes('icon'))return['Consistent stroke weight throughout','Uniform corner radius everywhere','Optical sizing for visual balance'];
  if(t.includes('social media'))return['One master template per format','Swap content, not structure','Batch export saves hours weekly'];
  if(t.includes('motion'))return['Duration: 200-400ms','Ease-out entrances, ease-in exits','One animated element per screen'];
  if(t.includes('print'))return['Print: CMYK, bleed, 300dpi','Digital: RGB, interactive states','The grid logic stays constant'];
  if(t.includes('logo animation'))return['Brand behaviour, not decoration','Under 2 seconds always','Must work without sound'];
  if(t.includes('personal brand'))return['Portfolio is your brand','Captions are your voice','Consistency is your reputation'];
  return['Study the principle deeply','Apply it deliberately to one project','Make it permanent in your process'];
}

function getAdvice(topic){
  const t=topic.toLowerCase();
  if(t.includes('signal'))return['Works identically at any scale','The detail clients remember','Without it you only have a wordmark'];
  if(t.includes('system')&&!t.includes('retainer'))return['A logo identifies. A system communicates.','Systems include colour, type and voice','Invest in the system, not the mark'];
  if(t.includes('brief'))return['State the problem, not the solution','Define the audience specifically','One page maximum, always'];
  if(t.includes('color')||t.includes('colour'))return['Warm hues signal energy and urgency','Cool hues communicate trust and calm','Your palette speaks before your words'];
  if(t.includes('750')||t.includes('3,500')||t.includes('price your'))return['Present three tiers, always','The middle option converts best','The top tier anchors perception'];
  if(t.includes('retainer'))return['Scope by deliverable count, not hours','Monthly brand check-in included','Build in a 30-day exit clause'];
  if(t.includes('present'))return['Lead with strategic rationale','Then reveal the visual solution','Never ask if they like it'];
  if(t.includes('guidelines'))return['Logo rules and clear space first','Full colour system with usage rules','Typography scale and voice examples'];
  if(t.includes('onboard'))return['Kickoff call within 48 hours','Mood reference before any sketches','Agreed milestones before production'];
  if(t.includes('feedback')||t.includes('revision'))return['Feedback is strategic direction','Revision is execution of direction','Distinguish them in every client email'];
  if(t.includes('niche'))return['Specialists earn more than generalists','A niche is a signal, not a limit','Compete on expertise, not price'];
  if(t.includes('burn'))return['Batch production work in blocks','Decline exposure-only projects firmly','Systems eliminate repeated decisions'];
  if(t.includes('deposit'))return['60% secures your time commitment','It signals the client is serious','Make it non-negotiable from day one'];
  if(t.includes('intake'))return['Goals, audience, tone, references','Restrictions and deal-breakers upfront','All decisions made in writing'];
  if(t.includes('multi'))return['EUR as your base currency','USD and GBP as adaptive rates','Remove payment friction for global clients'];
  return['Clarity before creativity always','Systems create sustainable results','Precision is the highest form of craft'];
}

function getStats(topic){
  const matches=[];
  const tests=[
    [/(\d+)\+\s*assets?\s+annually/i,'ASSETS/YEAR'],
    [/(\d+)\+\s*assets?/i,'ASSETS'],
    [/(\d+)%\s*faster/i,'% FASTER'],
    [/(\d+)\+\s*series/i,'SERIES LED'],
    [/(\d+)%\s*fewer/i,'% LESS REVISIONS'],
    [/(\d+)\+/g,'DELIVERED'],
  ];
  for(var i=0;i<tests.length;i++){
    var m=topic.match(tests[i][0]);
    if(m&&matches.length<2){
      var v=m[1]+(tests[i][1].includes('%')?'%':'+');
      if(!matches.find(function(x){return x.val===v;}))matches.push({val:v,label:tests[i][1]});
    }
  }
  if(!matches.length)matches.push({val:'8+',label:'YEARS EXP.'},{val:'500+',label:'ASSETS'});
  return matches.slice(0,2);
}

async function downloadPost(){
  const btn=document.getElementById('dlBtn');
  btn.disabled=true;btn.textContent='Rendering\u2026';
  const post=POSTS[currentPost];
  const off=document.createElement('div');
  off.style.cssText='position:fixed;left:-9999px;top:0;width:1080px;height:1350px;overflow:hidden;';
  off.innerHTML=buildDesignHTML(post,currentTheme);
  document.body.appendChild(off);
  await document.fonts.ready;
  await new Promise(function(r){setTimeout(r,400);});
  try{
    const cv=await html2canvas(off,{width:1080,height:1350,scale:1,useCORS:true,allowTaint:true,backgroundColor:currentTheme.bg,logging:false});
    const fc=document.createElement('canvas');
    fc.width=1080;fc.height=1350;
    const ctx=fc.getContext('2d');
    const r=40,b=14,ir=28;
    // White rounded outer frame
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(1080-r,0);ctx.quadraticCurveTo(1080,0,1080,r);
    ctx.lineTo(1080,1350-r);ctx.quadraticCurveTo(1080,1350,1080-r,1350);
    ctx.lineTo(r,1350);ctx.quadraticCurveTo(0,1350,0,1350-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    // Clip inner design
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(b+ir,b);ctx.lineTo(1080-b-ir,b);ctx.quadraticCurveTo(1080-b,b,1080-b,b+ir);
    ctx.lineTo(1080-b,1350-b-ir);ctx.quadraticCurveTo(1080-b,1350-b,1080-b-ir,1350-b);
    ctx.lineTo(b+ir,1350-b);ctx.quadraticCurveTo(b,1350-b,b,1350-b-ir);
    ctx.lineTo(b,b+ir);ctx.quadraticCurveTo(b,b,b+ir,b);ctx.closePath();ctx.clip();
    ctx.drawImage(cv,b,b,1080-b*2,1350-b*2);ctx.restore();
    const a=document.createElement('a');
    const slug=post[3].toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,36);
    a.download='MANNORR-'+post[0].replace(' ','')+'-'+slug+'-'+currentTheme.id+'.jpg';
    a.href=fc.toDataURL('image/jpeg',0.95);a.click();
  }catch(e){alert('Error: '+e.message);}
  finally{
    document.body.removeChild(off);
    btn.disabled=false;btn.textContent='\u2193 Download 1080 \u00d7 1350 JPEG';
  }
}
