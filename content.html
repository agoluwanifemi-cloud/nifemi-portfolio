<style>
:root{--bg:#0a0a0a;--fg:#e8e4df;--accent:#c8ff00;--muted:#5a5651;--card:#111;--border:rgba(255,255,255,0.07)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--fg);font-family:'DM Mono',monospace;font-weight:300;min-height:100vh;overflow-x:hidden}
/* LOCK */
#lockScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem}
.lock-logo{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--fg)}
.lock-logo b{display:inline-block;width:9px;height:9px;background:var(--accent);border-radius:50%;margin-left:3px;vertical-align:middle}
.lock-sub{font-size:.58rem;text-transform:uppercase;letter-spacing:.32em;color:var(--muted)}
.lock-form{display:flex;flex-direction:column;gap:.7rem;width:260px}
.lock-input{background:var(--card);border:1px solid var(--border);color:var(--fg);font-family:'DM Mono',monospace;font-size:.82rem;padding:.85rem 1.1rem;outline:none;transition:border-color .3s;letter-spacing:.1em}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{background:var(--accent);color:#0a0a0a;border:none;font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.22em;padding:.88rem;cursor:pointer}
.lock-err{font-size:.62rem;color:#ff5555;text-align:center;letter-spacing:.1em;display:none}
/* GRAIN */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:8000;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.028}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.9rem 3vw;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.07em;text-transform:uppercase;color:var(--fg)}
.nav-logo b{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin-left:3px;vertical-align:middle}
.nav-right{display:flex;align-items:center;gap:1.2rem}
.nav-tag{font-size:.55rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent);border:1px solid rgba(200,255,0,.28);padding:.22rem .65rem}
.nav-count{font-size:.58rem;color:var(--muted)}
/* CONTROLS */
.controls{padding:1.2rem 3vw;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:.9rem;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:.35rem}
.ctrl-label{font-size:.48rem;text-transform:uppercase;letter-spacing:.25em;color:var(--accent)}
.ctrl-pills{display:flex;gap:.3rem;flex-wrap:wrap}
.pill{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;padding:.28rem .78rem;border:1px solid var(--border);color:var(--muted);cursor:pointer;background:none;transition:all .2s}
.pill:hover{border-color:rgba(255,255,255,.3);color:var(--fg)}
.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.05)}
.search-wrap{margin-left:auto}
.search-input{background:var(--card);border:1px solid var(--border);color:var(--fg);font-family:'DM Mono',monospace;font-size:.7rem;padding:.48rem .95rem;outline:none;width:190px;transition:border-color .3s}
.search-input:focus{border-color:var(--accent)}
/* GRID */
.grid-wrap{padding:1.8rem 3vw}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.85rem}
.post-card{background:var(--card);border:1px solid var(--border);cursor:pointer;transition:border-color .22s,transform .22s;overflow:hidden}
.post-card:hover{border-color:rgba(200,255,0,.35);transform:translateY(-2px)}
.post-thumb{width:100%;overflow:hidden;position:relative}
.post-card-info{padding:.65rem .9rem;border-top:1px solid var(--border)}
.post-card-date{font-size:.5rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:.18rem}
.post-card-topic{font-size:.68rem;color:var(--fg);line-height:1.35;margin-bottom:.35rem;font-weight:400}
.post-card-meta{display:flex;gap:.28rem;flex-wrap:wrap}
.pct{font-size:.48rem;text-transform:uppercase;letter-spacing:.1em;padding:.18rem .45rem;border:1px solid var(--border);color:var(--muted)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:5000;display:none;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-inner{display:flex;gap:1.8rem;align-items:flex-start;max-width:960px;width:100%;margin:auto}
.modal-preview-wrap{flex-shrink:0;position:relative}
.modal-canvas-container{width:340px;border-radius:18px;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.9)}
.modal-close{position:absolute;top:-2.4rem;right:0;background:none;border:1px solid var(--border);color:var(--fg);font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;padding:.38rem .85rem;cursor:pointer;transition:border-color .2s}
.modal-close:hover{border-color:var(--accent)}
.modal-side{flex:1;display:flex;flex-direction:column;gap:.9rem;min-width:0}
.modal-date{font-size:.52rem;text-transform:uppercase;letter-spacing:.24em;color:var(--accent)}
.modal-topic{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:-.02em;line-height:1.25;color:var(--fg)}
.modal-pillar{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)}
.modal-section-label{font-size:.5rem;text-transform:uppercase;letter-spacing:.24em;color:var(--accent);margin-bottom:.38rem}
.modal-caption{background:#0a0a0a;border:1px solid var(--border);padding:.85rem .95rem;font-size:.68rem;line-height:1.85;color:var(--fg);max-height:110px;overflow-y:auto}
.theme-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.35rem}
.theme-btn{aspect-ratio:1;border:2px solid transparent;cursor:pointer;border-radius:5px;transition:border-color .18s;overflow:hidden;display:flex;align-items:center;justify-content:center}
.theme-btn.active{border-color:var(--accent)}
.theme-btn span{font-family:'DM Mono',monospace;font-size:.38rem;text-transform:uppercase;letter-spacing:.05em;font-weight:500;text-align:center;line-height:1.2;padding:2px}
.modal-dl-btn{background:var(--accent);color:#0a0a0a;border:none;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.17em;padding:.95rem;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:.45rem;transition:opacity .2s}
.modal-dl-btn:hover{opacity:.87}
.modal-dl-btn:disabled{opacity:.38;cursor:not-allowed}
.modal-nav{display:flex;gap:.4rem}
.modal-nav-btn{flex:1;background:none;border:1px solid var(--border);color:var(--fg);font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;padding:.58rem;cursor:pointer;transition:border-color .2s}
.modal-nav-btn:hover{border-color:var(--accent)}
@media(max-width:720px){.modal-inner{flex-direction:column;align-items:center}.modal-canvas-container{width:100%;max-width:300px}.modal-side{width:100%}}
</style>

var currentPost=0,currentTheme=THEMES[0],filteredPosts=POSTS.slice();
var activeFilter='all',activeMonth='all',searchTerm='';

function applyFilters(){
  filteredPosts=POSTS.filter(function(p){
    var mp=activeFilter==='all'||p[2]===activeFilter;
    var mm=activeMonth==='all'||p[0].indexOf(activeMonth)===0;
    var ms=!searchTerm||p[3].toLowerCase().indexOf(searchTerm.toLowerCase())>=0;
    return mp&&mm&&ms;
  });
  document.getElementById('navCount').textContent=filteredPosts.length+' posts';
  renderGrid();
}

function renderGrid(){
  var grid=document.getElementById('postGrid');
  grid.innerHTML='';
  filteredPosts.forEach(function(post){
    var card=document.createElement('div');
    card.className='post-card';
    var idx=POSTS.indexOf(post);
    card.onclick=function(){openModal(idx);};
    var thumbWrap=document.createElement('div');
    thumbWrap.className='post-thumb';
    var scale=210/1080;
    var ih=Math.round(1350*scale);
    thumbWrap.style.height=ih+'px';
    var inner=document.createElement('div');
    inner.style.cssText='transform:scale('+scale+');transform-origin:top left;width:1080px;height:1350px;flex-shrink:0;display:block;';
    inner.innerHTML=buildDesign(post,THEMES[0]);
    thumbWrap.appendChild(inner);
    var info=document.createElement('div');
    info.className='post-card-info';
    var typeLabel={TIP:'Design Tip',ADVICE:'Brand Advice',SPOTLIGHT:'Portfolio',PROCESS:'Process',QUOTE:'Quote'};
    info.innerHTML='<div class="post-card-date">'+post[0]+' &middot; '+post[1]+'</div><div class="post-card-topic">'+post[3]+'</div><div class="post-card-meta"><span class="pct">'+(typeLabel[post[2]]||post[2])+'</span></div>';
    card.appendChild(thumbWrap);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

/* ── DESIGN BUILDER ── */
function buildDesign(post,th){
  var type=post[2];
  if(type==='QUOTE')   return dQuote(post,th);
  if(type==='TIP')     return dTip(post,th);
  if(type==='ADVICE')  return dAdvice(post,th);
  if(type==='SPOTLIGHT')return dSpotlight(post,th);
  if(type==='PROCESS') return dProcess(post,th);
  return dTip(post,th);
}

function baseDiv(th,content){
  return '<div style="width:1080px;height:1350px;position:relative;overflow:hidden;background:'+th.bg+';color:'+th.fg+';font-family:Syne,sans-serif;-webkit-font-smoothing:antialiased;">'+content+'</div>';
}

/* shared footer bar */
function footer(th){

  document.getElementById('mDate').textContent=post[0]+' · '+post[1];
  document.getElementById('mTopic').textContent=post[3];
  document.getElementById('mPillar').textContent=(typeLabel[post[2]]||post[2])+' · '+post[4];
  document.getElementById('mCaption').textContent=post[7];
  var tg=document.getElementById('themeGrid');
  tg.innerHTML='';
  THEMES.forEach(function(th){
    var btn=document.createElement('button');
    btn.className='theme-btn'+(th.id===currentTheme.id?' active':'');
    btn.title=th.label;
    btn.style.cssText='background:'+th.bg+';border-color:'+(th.id===currentTheme.id?'#c8ff00':'transparent')+';';
    btn.innerHTML='<span style="color:'+th.fg+';">'+th.label+'</span>';
    btn.onclick=function(){currentTheme=th;showModal();};
    tg.appendChild(btn);
  });
  renderPreview();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function renderPreview(){
  var post=POSTS[currentPost];
  var c=document.getElementById('previewContainer');
  c.innerHTML='';
  var scale=340/1080;
  var h=Math.round(1350*scale);
  c.style.height=h+'px';
  var ww=document.createElement('div');
  ww.style.cssText='position:relative;width:100%;height:'+h+'px;overflow:hidden;border-radius:16px;';
  var inner=document.createElement('div');
  inner.style.cssText='transform:scale('+scale+');transform-origin:top left;width:1080px;height:1350px;display:block;';
  inner.innerHTML=buildDesign(post,currentTheme);
  ww.appendChild(inner);
  c.appendChild(ww);
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function navPost(d){var n=currentPost+d;if(n>=0&&n<POSTS.length){currentPost=n;showModal();}}

/* ── DOWNLOAD ── */
async function downloadPost(){
  var btn=document.getElementById('dlBtn');
  btn.disabled=true;btn.textContent='Rendering…';
  var post=POSTS[currentPost];
  var off=document.createElement('div');
  off.style.cssText='position:fixed;left:-9999px;top:0;width:1080px;height:1350px;overflow:hidden;z-index:-1;';
  off.innerHTML=buildDesign(post,currentTheme);
  document.body.appendChild(off);
  await document.fonts.ready;
  await new Promise(function(r){setTimeout(r,500);});
  try{
    var cv=await html2canvas(off,{width:1080,height:1350,scale:1,useCORS:true,allowTaint:true,backgroundColor:currentTheme.bg,logging:false});
    var fc=document.createElement('canvas');
    fc.width=1080;fc.height=1350;
    var ctx=fc.getContext('2d');
    /* white rounded outer frame */
    var r=44,b=16,ir=30;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(1080-r,0);ctx.quadraticCurveTo(1080,0,1080,r);ctx.lineTo(1080,1350-r);ctx.quadraticCurveTo(1080,1350,1080-r,1350);ctx.lineTo(r,1350);ctx.quadraticCurveTo(0,1350,0,1350-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    /* clip inner */
    ctx.save();ctx.beginPath();ctx.moveTo(b+ir,b);ctx.lineTo(1080-b-ir,b);ctx.quadraticCurveTo(1080-b,b,1080-b,b+ir);ctx.lineTo(1080-b,1350-b-ir);ctx.quadraticCurveTo(1080-b,1350-b,1080-b-ir,1350-b);ctx.lineTo(b+ir,1350-b);ctx.quadraticCurveTo(b,1350-b,b,1350-b-ir);ctx.lineTo(b,b+ir);ctx.quadraticCurveTo(b,b,b+ir,b);ctx.closePath();ctx.clip();
    ctx.drawImage(cv,b,b,1080-b*2,1350-b*2);ctx.restore();
    var a=document.createElement('a');
    var slug=post[3].toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,34);
    a.download='MANNORR-'+post[0].replace(' ','')+'-'+slug+'-'+currentTheme.id+'.jpg';
    a.href=fc.toDataURL('image/jpeg',0.95);a.click();
  }catch(e){alert('Render error: '+e.message);}
  finally{document.body.removeChild(off);btn.disabled=false;btn.innerHTML='&darr; Download 1080 &times; 1350 JPEG';}
}

/* ── EVENTS ── */
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pillarFilters').addEventListener('click',function(e){
    var b=e.target.closest('.pill');if(!b)return;
    document.querySelectorAll('#pillarFilters .pill').forEach(function(p){p.classList.remove('active');});
    b.classList.add('active');activeFilter=b.getAttribute('data-f');applyFilters();
  });
  document.getElementById('monthFilters').addEventListener('click',function(e){
    var b=e.target.closest('.pill');if(!b)return;
    document.querySelectorAll('#monthFilters .pill').forEach(function(p){p.classList.remove('active');});
    b.classList.add('active');activeMonth=b.getAttribute('data-m');applyFilters();
  });
  document.getElementById('searchInput').addEventListener('input',function(e){searchTerm=e.target.value;applyFilters();});
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')closeModal();
    var m=document.getElementById('modal');
    if(m.classList.contains('open')){
      if(e.key==='ArrowRight')navPost(1);
      if(e.key==='ArrowLeft')navPost(-1);
    }
  });
});
</script>
